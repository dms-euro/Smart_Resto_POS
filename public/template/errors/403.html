<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>403 · Akses Ditolak | Warung Daun</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Box Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8f5f2; }
        .bx { font-size: 1.25rem; vertical-align: middle; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .shake-animation {
            animation: shake 0.8s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[#f8f5f2]">
    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in">
        <div class="flex flex-col md:flex-row">
            <!-- Left: Ilustrasi -->
            <div class="md:w-1/2 bg-gradient-to-br from-[#8b5a2b] to-[#b48b5a] p-8 md:p-12 flex items-center justify-center">
                <div class="text-center">
                    <div class="shake-animation">
                        <i class='bx bx-lock-alt text-[#f8f5f2] text-8xl md:text-9xl'></i>
                    </div>
                    <h1 class="text-8xl md:text-9xl font-bold text-white mt-4">403</h1>
                    <p class="text-[#f0e7df] text-lg mt-2">Akses Ditolak</p>
                </div>
            </div>

            <!-- Right: Pesan & Tombol -->
            <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                <div class="max-w-sm mx-auto text-center md:text-left">
                    <i class='bx bx-shield-quarter text-[#b48b5a] text-5xl mb-4'></i>
                    <h2 class="text-2xl font-bold text-[#3d332b] mb-3">Tidak Bisa Masuk</h2>
                    <p class="text-gray-600 mb-6">
                        Maaf, Anda tidak memiliki izin untuk mengakses halaman ini.
                        Halaman ini khusus untuk role tertentu.
                    </p>

                    <div class="bg-[#f8f5f2] rounded-xl p-4 mb-6">
                        <p class="text-sm font-medium text-[#3d332b] mb-2">Akses diperlukan:</p>
                        <div class="flex gap-2 justify-center md:justify-start">
                            <span class="bg-[#7aa57a]/20 text-[#5a805a] px-3 py-1 rounded-full text-xs flex items-center gap-1">
                                <i class='bx bx-user-circle'></i> Admin
                            </span>
                            <span class="bg-[#b48b5a]/20 text-[#8e6943] px-3 py-1 rounded-full text-xs flex items-center gap-1">
                                <i class='bx bx-chef'></i> Chef
                            </span>
                            <span class="bg-[#3d332b]/20 text-[#3d332b] px-3 py-1 rounded-full text-xs flex items-center gap-1">
                                <i class='bx bx-cash-register'></i> Kasir
                            </span>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <a href="login.html" class="block w-full bg-[#7aa57a] text-white py-3 rounded-xl hover:bg-[#689268] transition flex items-center justify-center gap-2">
                            <i class='bx bx-log-in'></i> Login dengan Akun Lain
                        </a>
                        <a href="index.html" class="block w-full border border-[#ddd0c4] text-[#5f4d40] py-3 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-2">
                            <i class='bx bx-home'></i> Kembali ke Beranda
                        </a>
                    </div>

                    <div class="mt-8 pt-6 border-t border-[#f0e7df]">
                        <p class="text-sm text-gray-500">
                            Hubungi admin untuk akses: <span class="font-medium">admin@warungdaun.id</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
