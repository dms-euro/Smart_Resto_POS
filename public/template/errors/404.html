<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 · Halaman Tidak Ditemukan | Warung Daun</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Box Icons -->
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <!-- Inter font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #f8f5f2; }
        .bx { font-size: 1.25rem; vertical-align: middle; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }

        .float-animation {
            animation: float 4s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[#f8f5f2]">
    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden fade-in">
        <div class="flex flex-col md:flex-row">
            <!-- Left: Ilustrasi -->
            <div class="md:w-1/2 bg-gradient-to-br from-[#3d332b] to-[#5f4d40] p-8 md:p-12 flex items-center justify-center">
                <div class="text-center">
                    <div class="float-animation">
                        <i class='bx bx-error-circle text-[#bdd6bd] text-8xl md:text-9xl'></i>
                    </div>
                    <h1 class="text-8xl md:text-9xl font-bold text-white mt-4">404</h1>
                    <p class="text-[#e0d3c7] text-lg mt-2">Halaman Tidak Ditemukan</p>
                </div>
            </div>

            <!-- Right: Pesan & Tombol -->
            <div class="md:w-1/2 p-8 md:p-12 flex flex-col justify-center">
                <div class="max-w-sm mx-auto text-center md:text-left">
                    <i class='bx bx-leaf text-[#7aa57a] text-5xl mb-4'></i>
                    <h2 class="text-2xl font-bold text-[#3d332b] mb-3">Waduh, nyasar ya?</h2>
                    <p class="text-gray-600 mb-6">
                        Halaman yang Anda cari mungkin telah dipindahkan, dihapus, atau tidak pernah ada.
                        Yuk, kembali ke halaman utama.
                    </p>

                    <div class="space-y-3">
                        <a href="index.html" class="block w-full bg-[#7aa57a] text-white py-3 rounded-xl hover:bg-[#689268] transition flex items-center justify-center gap-2">
                            <i class='bx bx-home'></i> Kembali ke Beranda
                        </a>
                        <a href="javascript:history.back()" class="block w-full border border-[#ddd0c4] text-[#5f4d40] py-3 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-2">
                            <i class='bx bx-arrow-back'></i> Halaman Sebelumnya
                        </a>
                    </div>

                    <div class="mt-8 pt-6 border-t border-[#f0e7df]">
                        <p class="text-sm text-gray-500">
                            Butuh bantuan? <a href="#" class="text-[#7aa57a] hover:underline">Hubungi Support</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
